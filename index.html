<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Streaming Security Proxy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --alert-color: #ef4444;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
        }
        .wrapper {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .panel {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .field-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        textarea, input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.75rem;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .output-box {
            min-height: 150px;
            white-space: pre-wrap;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .alert-text {
            color: var(--alert-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Data Stream Processing & Sanitization Interface</h1>
    
    <div class="panel">
        <div class="field-group">
            <label for="simulationInput">Simulate Streaming Server Response Chunks:</label>
            <textarea id="simulationInput" rows="6">Here is your output block: 
Check documentation at [External Dashboard](https://untrusted-leak-site.org).
Alternatively, access direct data via http://malicious-domain.com directly.
Everything safe at [Google Official](https://google.com).</textarea>
        </div>
        <button id="processBtn">Execute Inline Defensive Sanitization</button>
    </div>

    <div class="panel">
        <label>Purified UI Render Target (Protected DOM Area):</label>
        <div id="uiRenderTarget" class="output-box">Output data will render live here...</div>
    </div>
</div>

<script>
class StreamSanitizationEngine {
    constructor(approvedHosts = null) {
        // Enforce structural set boundaries for host validation
        this.approvedHosts = approvedHosts ? new Set(approvedHosts) : new Set(["google.com", "wikipedia.org", "github.com"]);
        
        // Optimized pre-compiled regex patterns targeting browser engines
        this.markdownRegex = /\[([^\]]+)\]\(\s*([^\s)]+)\s*\)/g;
        this.rawUrlRegex = /(?i)\bhttps?:\/\/[^\s<>"]+/g; // Standard web URL protocol filter
    }

    /**
     * Extracts and validates the domain host layout from string targets.
     */
    isHostApproved(targetUrl) {
        if (!targetUrl) return false;
        try {
            const parsed = new URL(targetUrl.trim());
            if (parsed.protocol !== "http:" && parsed.protocol !== "https:") return false;

            // Isolate hostname, ensuring manual server ports are completely ignored
            let hostName = parsed.hostname.toLowerCase();

            // Match against base rules or verified parent domains
            if (this.approvedHosts.has(hostName)) return true;

            // Deep subdomain wildcard verification checks
            for (let approved of this.approvedHosts) {
                if (hostName.endsWith('.' + approved)) return true;
            }
            return false;
        } catch (e) {
            // Catches malformed string conversions gracefully
            return false;
        }
    }

    /**
     * Intercepts, parses, and cleans string sequences before UI rendering updates.
     */
    sanitizePayloadString(rawChunk) {
        if (!rawChunk) return "";

        // Phase 1: Neutralize unauthorized Markdown links
        let processed = rawChunk.replace(this.markdownRegex, (match, label, url) => {
            if (this.isHostApproved(url)) return match;
            return `${label} <span class="alert-text">[UNAUTHORIZED TARGET NEUTRALIZED]</span>`;
        });

        // Case-insensitive clean step configuration for raw link structures
        const caseInsensitiveUrlPattern = /https?:\/\/[^\s<>"]+/gi;

        // Phase 2: Purify raw, trailing URL strings
        processed = processed.replace(caseInsensitiveUrlPattern, (match) => {
            if (this.isHostApproved(match)) return match;
            return `<span class="alert-text">[EXFILTRATION STRING STRIPPED]</span>`;
        });

        return processed;
    }
}

// --- Application UI Controller Hook ---
document.addEventListener("DOMContentLoaded", () => {
    const inputArea = document.getElementById("simulationInput");
    const outputTarget = document.getElementById("uiRenderTarget");
    const processButton = document.getElementById("processBtn");

    // Instantiate core browser protection rules engine
    const guardEngine = new StreamSanitizationEngine();

    processButton.addEventListener("click", () => {
        const sourceText = inputArea.value;
        
        // Simulate progressive browser UI character streaming loops
        outputTarget.innerHTML = ""; 
        
        // Inline mitigation processing execution
        const cleanHtmlResult = guardEngine.sanitizePayloadString(sourceText);
        
        // Safely push layout mutations to render targets
        outputTarget.innerHTML = cleanHtmlResult;
    });
});
</script>

</body>
</html>
