<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rendering Performance PoC</title>
    <style>
        body { background: #1a1a1a; color: #d4d4d4; font-family: sans-serif; padding: 20px; }
        #log { color: #888; font-family: monospace; }
        .widget-block { margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Widget Rendering Stress Test</h2>
    <div id="log">Status: Idle</div>
    <div id="render-target"></div>

    <script>
        /**
         * This script generates high-density link structures.
         * The goal is to stress the widget instantiation logic.
         */
        const target = document.getElementById('render-target');
        const log = document.getElementById('log');

        function generateStressPayload(count) {
            log.innerText = "Status: Generating high-density widget load...";
            
            let fragment = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const container = document.createElement('div');
                container.className = 'widget-block';
                
                // Mimicking the structure of AI-generated markdown widgets
                container.innerHTML = `Entry_${i}: <a href="https://google.com/search?q=${i}">Interactive_Widget_${i}</a>`;
                fragment.appendChild(container);
            }
            
            // Batch append to force the UI engine to process all nodes simultaneously
            target.appendChild(fragment);
            log.innerText = `Status: Injected ${count} widgets. Monitoring rendering latency...`;
        }

        // Trigger on load
        window.onload = () => {
            const LOAD_SIZE = 5000; 
            generateStressPayload(LOAD_SIZE);
        };
    </script>
</body>
</html>
