<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Research: Rendering Stress Test</title>
    <style>
        body { background: #121212; color: #eee; font-family: monospace; padding: 20px; }
        #stream-output { border: 1px solid #444; height: 300px; overflow-y: scroll; padding: 10px; }
    </style>
</head>
<body>
    <h3>Targeted Rendering Stress Test</h3>
    <div id="stream-output"></div>
    <button onclick="startStressTest()">Trigger High-Frequency Injection</button>

    <script>
        async function startStressTest() {
            const output = document.getElementById('stream-output');
            // This loop forces the browser to handle rapid DOM updates
            // simulating the "Race Condition" in the TqqUIc container
            for (let i = 0; i < 1000; i++) {
                const chunk = document.createElement('div');
                chunk.innerHTML = `[Token_${i}](https://google.com) - Content_Hash: ${Math.random()}`;
                output.appendChild(chunk);
                
                // Minimal delay to keep the rendering engine saturated
                if (i % 10 === 0) {
                    await new Promise(r => setTimeout(r, 1));
                }
            }
        }
    </script>
</body>
</html>
