<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Renderer Stress Test</title>
</head>
<body>
    <div id="target-container"></div>

    <script>
        /**
         * This script aggressively injects malformed-but-valid markdown
         * to force the DOM rendering engine into an unstable state.
         */
        const container = document.getElementById('target-container');
        let sessionID = 0;

        function triggerRaceCondition() {
            // High-frequency injection cycle
            setInterval(() => {
                for (let i = 0; i < 20; i++) {
                    const el = document.createElement('div');
                    // Injecting an XID-style ID to conflict with the target's internal mapping
                    el.id = `TqqUIc_${sessionID++}`;
                    el.innerHTML = `[Token_${sessionID}](https://google.com) - ${Math.random().toString(36)}`;
                    container.appendChild(el);
                }
                
                // Triggers immediate garbage collection stress
                if (sessionID > 5000) {
                    container.innerHTML = "";
                    sessionID = 0;
                }
            }, 5); // 5ms interval to saturate the browser main thread
        }

        window.onload = triggerRaceCondition;
    </script>
</body>
</html>
